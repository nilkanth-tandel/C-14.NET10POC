name: Trigger External AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    # Avoid reviewing draft PRs until they are ready.
    if: github.event.pull_request.draft == false
    uses: nilkanth-tandel/ai-code-review-assistant/.github/workflows/ai-pr-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
